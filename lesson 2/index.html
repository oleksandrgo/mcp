<!DOCTYPE html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hillel MAX — Урок 2 · Приклад роботи існуючих серверів</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="deck" id="deck">
      <section class="slide slide--active" data-slide="0" aria-label="Титульний слайд">
        <video class="slide__video" autoplay muted loop playsinline preload="auto">
          <source src="../video%20and%20pcitures/Video/main%20slide.mp4" type="video/mp4" />
        </video>
        <div class="slide__scrim"></div>
        <div class="slide__glow" aria-hidden="true"></div>
        <div class="slide__inner slide__inner--title">
          <img
            class="slide__logo"
            src="../video%20and%20pcitures/Hillel%20MAX%20Logo/logo-w.svg"
            alt="Hillel MAX"
            width="280"
            height="39"
          />
          <p class="slide__eyebrow js-reveal">
            <span class="slide__tech-chip">
              <img src="../video%20and%20pcitures/icons/mcp-color.svg" alt="" width="20" height="20" />
              IT · Model Context Protocol
            </span>
          </p>
          <h1 class="slide__title js-reveal">Приклад роботи існуючих серверів</h1>
          <p class="slide__subtitle js-reveal">Підключення MCP у Cursor та Claude Desktop</p>
          <div class="tech-chips js-reveal" aria-hidden="true">
            <span class="tech-chip"><img src="../video%20and%20pcitures/icons/mcp-color.svg" alt="" />MCP</span>
            <span class="tech-chip"><img src="../video%20and%20pcitures/icons/notion.svg" alt="" />Notion</span>
            <span class="tech-chip"><img src="../video%20and%20pcitures/icons/figma-color.svg" alt="" />Figma</span>
            <span class="tech-chip"><img src="../video%20and%20pcitures/icons/claude-color.png" alt="" />Claude</span>
          </div>
        </div>
      </section>

      <section class="slide" data-slide="1" aria-label="План заняття">
        <video class="slide__video" autoplay muted loop playsinline preload="auto">
          <source src="../video%20and%20pcitures/Video/northern%20lights%20slide.mp4" type="video/mp4" />
        </video>
        <div class="slide__scrim slide__scrim--plan"></div>
        <div class="slide__glow slide__glow--soft" aria-hidden="true"></div>
        <div class="slide__inner slide__inner--plan">
          <p class="slide__eyebrow slide__eyebrow--accent js-reveal-plan-header">Урок 2</p>
          <h2 class="slide__heading js-reveal-plan-header">План заняття</h2>
          <ol class="plan-list">
            <li class="plan-list__item js-plan-step">
              <span class="plan-list__num">01</span>
              <img class="plan-list__icon" src="../video%20and%20pcitures/icons/mcp-color.svg" alt="" width="32" height="32" />
              <span class="plan-list__text">Огляд існуючих MCP-серверів</span>
            </li>
            <li class="plan-list__item js-plan-step">
              <span class="plan-list__num">02</span>
              <img class="plan-list__icon" src="../video%20and%20pcitures/Hillel%20MAX%20Logo/symbol.svg" alt="" width="32" height="32" />
              <span class="plan-list__text">Cursor: Settings → MCP / <code>mcp.json</code></span>
            </li>
            <li class="plan-list__item js-plan-step">
              <span class="plan-list__num">03</span>
              <img class="plan-list__icon" src="../video%20and%20pcitures/icons/claude-color.png" alt="" width="32" height="32" />
              <span class="plan-list__text">Claude Desktop: <code>claude_desktop_config.json</code></span>
            </li>
          </ol>
        </div>
      </section>
    </div>

    <nav class="nav" aria-label="Навігація по слайдах">
      <button type="button" class="nav__btn" id="prev" aria-label="Попередній слайд">←</button>
      <span class="nav__progress" id="navProgress" aria-live="polite">1 / 2</span>
      <div class="nav__dots" id="dots" role="tablist" aria-label="Слайди"></div>
      <button type="button" class="nav__btn" id="next" aria-label="Наступний слайд">→</button>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
